<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fiszki - Nauka Słówek</title>

    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --blue: #007AFF;
            --green-light: #E5F8EB;
            --green-text: #34C759;
            --red-light: #FFECEB;
            --red-text: #FF3B30;
            --pleasant-purple: #5856D6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1, h2 { font-weight: 600; margin-bottom: 8px; }
        p { color: var(--text-muted); font-size: 15px; margin-top: 0; }

        button { touch-action: manipulation; font-family: inherit; }

        .btn {
            border: none; border-radius: 14px; padding: 16px; font-size: 17px;
            font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary { background-color: var(--blue); color: white; margin-top: 20px; }
        .btn-pleasant { background-color: var(--pleasant-purple); color: white; margin-top: 15px; }

        .btn-text-only {
            background: transparent; color: var(--text-muted); border: none;
            padding: 12px; font-size: 15px; margin-top: 10px; cursor: pointer; width: 100%;
        }

        .flashcard {
            background-color: var(--card-bg); border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            padding: 50px 20px; margin: 20px 0; min-height: 180px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .word-eng { font-size: 32px; font-weight: 700; color: var(--text-main); margin-bottom: 5px; }
        .word-pol { font-size: 22px; font-weight: 500; color: var(--text-muted); display: none; margin-top: 15px; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .counter { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .hidden { display: none !important; }

        .btn-slim {
            background: transparent; border: 1px solid rgba(0, 122, 255, 0.3); color: var(--blue);
            border-radius: 20px; padding: 8px 16px; font-size: 14px; font-weight: 500; margin-top: 20px; cursor: pointer;
        }

        .eval-container { display: flex; gap: 12px; width: 100%; margin-top: 10px; }
        .btn-yes { background-color: darkgreen; color: green; flex: 1; }
        .btn-no { background-color: darkred; color: red; flex: 1; }

        .stats-box { display: flex; justify-content: space-between; background: var(--card-bg); padding: 20px; border-radius: 16px; margin: 20px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.03); }
        .stat-item { display: flex; flex-direction: column; font-size: 13px; color: var(--text-muted); }
        .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; color: var(--text-main); }

        .mistakes-list { text-align: left; background: var(--card-bg); padding: 20px; border-radius: 16px; max-height: 250px; overflow-y: auto; margin-top: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.03); }
        .mistakes-list ul { padding-left: 0; list-style: none; margin: 0; }
        .mistakes-list li { padding: 10px 0; border-bottom: 1px solid #F2F2F7; font-size: 15px; }
        .mistakes-list li:last-child { border-bottom: none; }
        .mistakes-list strong { color: var(--red-text); display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="container" id="app">

    <div id="loading-screen">
        <p id="loading-text" style="font-size: 15px; margin-top: 50px;">Pobieranie fiszek...</p>
        <button id="btn-back-empty" class="btn-text-only hidden" style="margin-top: 20px;">Powrót do edycji</button>
    </div>

    <div id="flashcard-screen" class="hidden">
        <div class="counter" id="card-counter">1 / 100</div>

        <div class="flashcard">
            <div class="word-eng"><span id="english-word"></span></div>
            <button class="btn-slim" id="btn-show-translation">Pokaż tłumaczenie</button>
            <div class="word-pol" id="polish-word"><span></span></div>
        </div>

        <div id="evaluation-buttons" class="hidden">
            <div class="eval-container">
                <button class="btn btn-no" id="btn-eval-no">Nie (N)</button>
                <button class="btn btn-yes" id="btn-eval-yes">Tak (T)</button>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-text-only" id="btn-end-session-1">Zakończ sesję</button>
                <button class="btn-text-only" id="btn-back-to-deck-1">Powrót do edycji</button>
            </div>
        </div>
    </div>

    <div id="summary-screen" class="hidden">
        <h2>Podsumowanie</h2>

        <div class="stats-box">
            <div class="stat-item">Przerobiono<span class="stat-value" id="stat-total">0</span></div>
            <div class="stat-item">Znam<span class="stat-value" id="stat-correct" style="color: var(--green-text);">0</span></div>
            <div class="stat-item">Błędy<span class="stat-value" id="stat-mistakes" style="color: var(--red-text);">0</span></div>
        </div>

        <div id="mistakes-container" class="hidden">
            <h3 style="font-size: 16px; margin-bottom: 10px;">Do powtórki:</h3>
            <div class="mistakes-list"><ul id="mistakes-list-ul"></ul></div>
        </div>

        <h3 id="congratulations-msg" class="hidden" style="color: var(--green-text); font-size: 18px; margin: 30px 0;">🎉 Bezbłędnie!</h3>

        <div style="margin-top: 20px;">
            <button id="btn-new-session" class="btn btn-primary">Nowa sesja</button>
            <button id="btn-retry-mistakes" class="btn btn-pleasant hidden">Powtórz błędy</button>
            <button class="btn-text-only" style="margin-top: 15px;" id="btn-back-to-deck-2">Powrót do edycji</button>
        </div>
    </div>

</div>

<script src="js/api-client.js"></script>
<script>
    let bazaSlownictwa = {};
    const urlParams = new URLSearchParams(window.location.search);
    const deckId = urlParams.get('deckId');

    function goBackToDeck() {
        window.location.href = 'import.html?deckId=' + deckId;
    }

    async function loadWords() {
        try {
            const response = await FiszkiAPI.apiFetch('/words/get', {
                method: 'POST',
                body: JSON.stringify({ deckId: parseInt(deckId, 10) }),
            });
            const data = await response.json();

            if (data.success) {
                data.words.forEach((word) => {
                    bazaSlownictwa[word.base] = word.translation;
                });

                const count = Object.keys(bazaSlownictwa).length;
                if (count > 0) {
                    document.getElementById('loading-screen').classList.add('hidden');
                    startSession(bazaSlownictwa);
                } else {
                    document.getElementById('loading-text').innerText = 'Talia jest pusta. Dodaj najpierw słówka!';
                    document.getElementById('btn-back-empty').classList.remove('hidden');
                }
            } else {
                document.getElementById('loading-text').innerText = 'Wystąpił błąd podczas ładowania talii.';
                document.getElementById('btn-back-empty').classList.remove('hidden');
            }
        } catch (error) {
            console.error(error);
            document.getElementById('loading-text').innerText = 'Błąd połączenia z bazą.';
            document.getElementById('btn-back-empty').classList.remove('hidden');
        }
    }

    let currentDeck = [];
    let mistakesDeck = {};
    let currentIndex = 0;
    let correctCount = 0;
    let totalCardsInSession = 0;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startSession(sourceDictionary) {
        let entries = Object.entries(sourceDictionary);
        currentDeck = shuffleArray(entries);

        mistakesDeck = {};
        currentIndex = 0;
        correctCount = 0;
        totalCardsInSession = currentDeck.length;

        document.getElementById('summary-screen').classList.add('hidden');
        document.getElementById('flashcard-screen').classList.remove('hidden');

        loadCard();
    }

    function startNewSession() {
        startSession(bazaSlownictwa);
    }

    function loadCard() {
        if (currentIndex < currentDeck.length) {
            const [ang, pol] = currentDeck[currentIndex];

            document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${totalCardsInSession}`;
            document.getElementById('english-word').innerText = ang;
            document.getElementById('polish-word').querySelector('span').innerText = pol;

            document.getElementById('polish-word').style.display = 'none';
            document.getElementById('btn-show-translation').classList.remove('hidden');
            document.getElementById('evaluation-buttons').classList.add('hidden');
        } else {
            endSession();
        }
    }

    function showTranslation() {
        document.getElementById('polish-word').style.display = 'block';
        document.getElementById('btn-show-translation').classList.add('hidden');
        document.getElementById('evaluation-buttons').classList.remove('hidden');
    }

    function evaluateAnswer(knewIt) {
        const [ang, pol] = currentDeck[currentIndex];

        if (knewIt) {
            correctCount++;
        } else {
            mistakesDeck[ang] = pol;
        }

        currentIndex++;
        loadCard();
    }

    function startMistakesSession() {
        startSession(mistakesDeck);
    }

    function endSession() {
        document.getElementById('flashcard-screen').classList.add('hidden');
        document.getElementById('summary-screen').classList.remove('hidden');

        document.getElementById('stat-total').innerText = currentIndex;
        document.getElementById('stat-correct').innerText = correctCount;
        document.getElementById('stat-mistakes').innerText = Object.keys(mistakesDeck).length;

        const mistakesContainer = document.getElementById('mistakes-container');
        const mistakesListUl = document.getElementById('mistakes-list-ul');
        const btnRetry = document.getElementById('btn-retry-mistakes');
        const congratsMsg = document.getElementById('congratulations-msg');

        mistakesListUl.innerHTML = '';

        if (Object.keys(mistakesDeck).length > 0) {
            mistakesContainer.classList.remove('hidden');
            btnRetry.classList.remove('hidden');
            congratsMsg.classList.add('hidden');

            // textContent zamiast innerHTML - słówka pochodzą z bazy danych
            // użytkownika i nie powinny być interpretowane jako HTML.
            for (const [ang, pol] of Object.entries(mistakesDeck)) {
                const li = document.createElement('li');
                const strong = document.createElement('strong');
                strong.textContent = ang;
                li.appendChild(strong);
                li.appendChild(document.createTextNode(pol));
                mistakesListUl.appendChild(li);
            }
        } else {
            mistakesContainer.classList.add('hidden');
            btnRetry.classList.add('hidden');
            congratsMsg.classList.toggle('hidden', currentIndex === 0);
        }
    }

    document.addEventListener('keydown', function (event) {
        const flashcardScreen = document.getElementById('flashcard-screen');
        if (flashcardScreen.classList.contains('hidden')) return;

        const evalButtonsHidden = document.getElementById('evaluation-buttons').classList.contains('hidden');

        if (evalButtonsHidden && (event.key === 'Enter' || event.key === ' ')) {
            showTranslation();
        } else if (!evalButtonsHidden) {
            const key = event.key.toLowerCase();
            if (key === 't') evaluateAnswer(true);
            else if (key === 'n') evaluateAnswer(false);
            else if (key === 'q') endSession();
        }
    });

    (async function init() {
        const authed = await FiszkiAPI.requireAuth();
        if (!authed) return;

        if (!deckId) {
            alert('Błąd: Brak ID talii w adresie URL!');
            window.location.href = 'Tworzenie.html';
            return;
        }

        document.getElementById('btn-back-empty').addEventListener('click', goBackToDeck);
        document.getElementById('btn-show-translation').addEventListener('click', showTranslation);
        document.getElementById('btn-eval-no').addEventListener('click', () => evaluateAnswer(false));
        document.getElementById('btn-eval-yes').addEventListener('click', () => evaluateAnswer(true));
        document.getElementById('btn-end-session-1').addEventListener('click', endSession);
        document.getElementById('btn-back-to-deck-1').addEventListener('click', goBackToDeck);
        document.getElementById('btn-new-session').addEventListener('click', startNewSession);
        document.getElementById('btn-retry-mistakes').addEventListener('click', startMistakesSession);
        document.getElementById('btn-back-to-deck-2').addEventListener('click', goBackToDeck);

        loadWords();
    })();
</script>

</body>
</html>
